<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacuzzi Solar Dashboard</title>
  <style>
    :root {
      --bg: #f3f7f6;
      --panel: #ffffff;
      --ink: #1a2a2a;
      --accent: #0f7c80;
      --accent-soft: #d4efef;
      --warn: #b94a00;
      --good: #1b6e35;
      --shadow: 0 10px 35px rgba(15, 31, 31, 0.12);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% -10%, #dbf2ef 0%, transparent 42%),
        radial-gradient(circle at 90% 10%, #ffeed6 0%, transparent 34%),
        var(--bg);
      min-height: 100vh;
      padding: 28px 16px;
    }

    .shell {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(120deg, #0f7c80, #1f9ba1);
      color: #f8ffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 8px 0 0;
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .label {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.7;
      font-weight: 700;
    }

    .value {
      margin: 8px 0 0;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .sub {
      margin-top: 6px;
      opacity: 0.72;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      background: var(--accent-soft);
      color: #124b4d;
    }

    .pill.on {
      background: #ffe2cd;
      color: var(--warn);
    }

    details.settings {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 18px 18px;
    }

    details.settings > summary {
      cursor: pointer;
      list-style: none;
      font-size: 1rem;
      font-weight: 800;
      padding: 10px 0;
    }

    details.settings > summary::-webkit-details-marker {
      display: none;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 8px;
    }

    label {
      grid-column: 1 / -1;
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0.8;
    }

    input {
      width: 100%;
      border: 1px solid #c7d7d8;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .status {
      margin-top: 10px;
      min-height: 1.2em;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.ok { color: var(--good); }
    .status.err { color: #9c2d2d; }

    .chart-card {
      display: grid;
      gap: 10px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select {
      border: 1px solid #c7d7d8;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.95rem;
      background: #fff;
    }

    canvas {
      width: 100%;
      height: 260px;
      border-radius: 12px;
      background: linear-gradient(180deg, #f6fdfd, #f0f7f7);
      border: 1px solid #e1ecec;
    }

    .chart-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0.86;
    }

    @media (max-width: 560px) {
      form {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Jacuzzi Solar Dashboard</h1>
      <p>Live inzicht in teruglevering en relaisstatus.</p>
    </section>

    <section class="grid">
      <article class="card">
        <p class="label">Teruglevering</p>
        <p class="value" id="feedValue">-</p>
        <p class="sub" id="powerSub">Laatste meting: -</p>
      </article>

      <article class="card">
        <p class="label">Relais</p>
        <p class="value" id="relayValue">-</p>
        <p class="sub"><span class="pill" id="relayPill">Status onbekend</span></p>
      </article>

      <article class="card">
        <p class="label">Heater (SCT-013)</p>
        <p class="value" id="heaterValue">-</p>
        <p class="sub" id="heaterSub">Vermogen: -</p>
      </article>
    </section>

    <section class="card chart-card">
      <div class="chart-header">
        <p class="label">Historie</p>
        <select id="rangeSelect">
          <option value="6">Laatste 6 uur</option>
          <option value="24" selected>Laatste 24 uur</option>
          <option value="168">Laatste 7 dagen</option>
        </select>
      </div>
      <canvas id="historyChart" width="900" height="260"></canvas>
      <div class="chart-meta">
        <span id="energyMeta">Heater energie: -</span>
        <span id="onMeta">Heater actief: -</span>
        <span id="pointsMeta">Meetpunten: -</span>
      </div>
    </section>

    <details class="settings">
      <summary>Instellingen</summary>
      <form id="settingsForm">
        <label for="p1Ip">P1 IP-adres</label>
        <input id="p1Ip" name="p1Ip" type="text" placeholder="Bijv. 192.168.1.171" required>
        <label for="exportThresholdW">Drempel voor zonnesurplus (W)</label>
        <input id="exportThresholdW" name="exportThresholdW" type="number" step="50" placeholder="-1500">
        <label for="importThresholdW">Drempel voor weinig zonnesurplus (W)</label>
        <input id="importThresholdW" name="importThresholdW" type="number" step="50" placeholder="1500">
        <button type="submit">Opslaan</button>
      </form>
      <div class="status" id="saveStatus"></div>
    </details>
  </main>

  <script>
    const feedValue = document.getElementById('feedValue');
    const powerSub = document.getElementById('powerSub');
    const relayValue = document.getElementById('relayValue');
    const relayPill = document.getElementById('relayPill');
    const heaterValue = document.getElementById('heaterValue');
    const heaterSub = document.getElementById('heaterSub');
    const p1IpInput = document.getElementById('p1Ip');
    const exportThresholdWInput = document.getElementById('exportThresholdW');
    const importThresholdWInput = document.getElementById('importThresholdW');
    const settingsForm = document.getElementById('settingsForm');
    const saveStatus = document.getElementById('saveStatus');
    const rangeSelect = document.getElementById('rangeSelect');
    const historyChart = document.getElementById('historyChart');
    const historyContext = historyChart.getContext('2d');
    const energyMeta = document.getElementById('energyMeta');
    const onMeta = document.getElementById('onMeta');
    const pointsMeta = document.getElementById('pointsMeta');

    function setStatusMessage(message, type) {
      saveStatus.textContent = message;
      saveStatus.className = 'status ' + (type || '');
    }

    async function loadSettings() {
      const response = await fetch('/api/settings');
      if (!response.ok) {
        throw new Error('Instellingen konden niet worden geladen');
      }
      const data = await response.json();
      p1IpInput.value = data.p1Ip || '';
      exportThresholdWInput.value = data.exportThresholdW ?? '';
      importThresholdWInput.value = data.importThresholdW ?? '';
    }

    function formatPower(power) {
      if (typeof power !== 'number') {
        return '-';
      }
      return power + ' W';
    }

    function renderStatus(data) {
      const power = typeof data.activePowerW === 'number' ? data.activePowerW : null;
      const feed = typeof data.feedInW === 'number' ? data.feedInW : null;

      feedValue.textContent = feed === null ? '-' : feed + ' W';
      powerSub.textContent = 'Laatste meting: ' + formatPower(power);

      relayValue.textContent = data.relayEnabled ? 'Pauze' : 'Actief';
      relayPill.textContent = data.relayEnabled
        ? 'Extra verwarming gepauzeerd'
        : 'Extra verwarming actief met zonnesurplus';
      relayPill.className = data.relayEnabled ? 'pill on' : 'pill';

      if (data.heaterSensorAvailable) {
        heaterValue.textContent = data.heaterOn ? 'AAN' : 'UIT';
        heaterSub.textContent = 'Vermogen: ' + formatPower(data.heaterPowerW);
      } else {
        heaterValue.textContent = 'N/A';
        heaterSub.textContent = data.heaterSensorReason || 'Sensor niet beschikbaar';
      }
    }

    function drawHistoryChart(points) {
      const width = historyChart.width;
      const height = historyChart.height;
      const pad = { top: 18, right: 14, bottom: 22, left: 44 };

      historyContext.clearRect(0, 0, width, height);

      if (!points.length) {
        historyContext.fillStyle = '#577';
        historyContext.font = '16px Nunito Sans, sans-serif';
        historyContext.fillText('Nog geen history data', width / 2 - 80, height / 2);
        return;
      }

      const safePoints = points.map((point) => ({
        ts: Date.parse(point.ts),
        feedInW: typeof point.feedInW === 'number' ? point.feedInW : 0,
        heaterPowerW: typeof point.heaterPowerW === 'number' ? point.heaterPowerW : 0,
      }));

      const minTs = safePoints[0].ts;
      const maxTs = safePoints[safePoints.length - 1].ts;
      const spanTs = Math.max(1, maxTs - minTs);
      const maxY = Math.max(1, ...safePoints.map((point) => Math.max(point.feedInW, point.heaterPowerW)));

      const xAt = (ts) => pad.left + ((ts - minTs) / spanTs) * (width - pad.left - pad.right);
      const yAt = (value) => height - pad.bottom - (value / maxY) * (height - pad.top - pad.bottom);

      historyContext.strokeStyle = '#d6e6e6';
      historyContext.lineWidth = 1;
      historyContext.beginPath();
      historyContext.moveTo(pad.left, pad.top);
      historyContext.lineTo(pad.left, height - pad.bottom);
      historyContext.lineTo(width - pad.right, height - pad.bottom);
      historyContext.stroke();

      historyContext.fillStyle = '#456';
      historyContext.font = '12px Nunito Sans, sans-serif';
      historyContext.fillText('0W', 10, height - pad.bottom + 4);
      historyContext.fillText(Math.round(maxY) + 'W', 8, pad.top + 4);

      function drawLine(getValue, color) {
        historyContext.beginPath();
        historyContext.strokeStyle = color;
        historyContext.lineWidth = 2;

        safePoints.forEach((point, index) => {
          const x = xAt(point.ts);
          const y = yAt(getValue(point));
          if (index === 0) {
            historyContext.moveTo(x, y);
          } else {
            historyContext.lineTo(x, y);
          }
        });

        historyContext.stroke();
      }

      drawLine((point) => point.feedInW, '#0f7c80');
      drawLine((point) => point.heaterPowerW, '#b94a00');

      historyContext.fillStyle = '#0f7c80';
      historyContext.fillRect(width - 220, 16, 12, 3);
      historyContext.fillStyle = '#2b5555';
      historyContext.fillText('Teruglevering', width - 200, 20);

      historyContext.fillStyle = '#b94a00';
      historyContext.fillRect(width - 220, 36, 12, 3);
      historyContext.fillStyle = '#2b5555';
      historyContext.fillText('Heater vermogen', width - 200, 40);
    }

    async function refreshHistory() {
      try {
        const response = await fetch('/api/history?hours=' + encodeURIComponent(rangeSelect.value));
        if (!response.ok) {
          throw new Error('Historie kon niet worden opgehaald');
        }

        const payload = await response.json();
        drawHistoryChart(payload.points || []);

        const summary = payload.summary || {};
        energyMeta.textContent = 'Heater energie: ' + (summary.heaterEnergyWh ?? '-') + ' Wh';
        onMeta.textContent = 'Heater actief: ' + (summary.heaterOnMinutes ?? '-') + ' min';
        pointsMeta.textContent = 'Meetpunten: ' + (summary.points ?? '-');
      } catch (error) {
        energyMeta.textContent = 'Fout: ' + error.message;
      }
    }

    async function refreshStatus() {
      try {
        const response = await fetch('/api/status');
        if (!response.ok) {
          throw new Error('Status kon niet worden opgehaald');
        }
        const data = await response.json();
        renderStatus(data);
      } catch (error) {
        powerSub.textContent = 'Fout: ' + error.message;
      }
    }

    settingsForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      setStatusMessage('Opslaan...', '');

      try {
        const response = await fetch('/api/settings', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
          p1Ip: p1IpInput.value.trim(),
          exportThresholdW: Number(exportThresholdWInput.value),
          importThresholdW: Number(importThresholdWInput.value)
        })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || 'Opslaan mislukt');
        }

        setStatusMessage('Opgeslagen. Nieuwe meting wordt direct opgehaald.', 'ok');
        await refreshStatus();
        await refreshHistory();
      } catch (error) {
        setStatusMessage(error.message, 'err');
      }
    });

    rangeSelect.addEventListener('change', () => {
      refreshHistory();
    });

    (async function init() {
      try {
        await loadSettings();
      } catch (error) {
        setStatusMessage(error.message, 'err');
      }

      await refreshStatus();
      await refreshHistory();
      setInterval(refreshStatus, 5000);
      setInterval(refreshHistory, 20000);
    })();
  </script>
</body>
</html>
