name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-raspberry
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        shell: bash
        run: |
          install -d -m 700 ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "${{ secrets.RPI_HOST }}" ]]; then
            ssh-keyscan -H "${{ secrets.RPI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      - name: Prepare app directory on Raspberry Pi
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}" \
            "mkdir -p '${{ secrets.RPI_APP_DIR }}'"

      - name: Sync files to Raspberry Pi
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'history.db' \
            --exclude '*.log' \
            -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}:${{ secrets.RPI_APP_DIR }}/"

      - name: Run remote install/update script
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}" \
            "sudo bash '${{ secrets.RPI_APP_DIR }}/deploy/update-on-pi.sh' '${{ secrets.RPI_APP_DIR }}' '${{ secrets.RPI_APP_USER }}' '${{ secrets.RPI_APP_GROUP }}'"